name: Update World Cup results

on:
  schedule:
    # every 6 hours during the tournament window (June-July 2026)
    - cron: "0 */6 * 6,7 *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-results:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch latest results
        run: python scripts/fetch_results.py

      - name: Commit and push if changed
        run: |
          git config user.name "wc-results-bot"
          git config user.email "actions@users.noreply.github.com"
          git add js/results.js
          if git diff --cached --quiet; then
            echo "No new results."
          else
            git commit -m "chore: update World Cup results"
            git push
          fi
